<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="bubbleGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#d6e8ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#99c2ff" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- The main sleep bubble -->
  <circle cx="45" cy="55" r="32" fill="url(#bubbleGrad)" stroke="#7ab0ff" stroke-width="1.5" filter="url(#glow)"/>
  
  <!-- Glossy highlight to make it look like a membrane -->
  <path d="M 25 45 A 22 22 0 0 1 55 28" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 65 70 A 18 18 0 0 0 72 55" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Zzz marks floating away -->
  <g fill="#6b7280" font-family="system-ui, -apple-system, sans-serif" font-weight="900">
    <text x="68" y="32" font-size="22" transform="rotate(-15 68 32)">Z</text>
    <text x="82" y="16" font-size="14" transform="rotate(-15 82 16)" opacity="0.8">z</text>
    <text x="92" y="4" font-size="10" transform="rotate(-15 92 4)" opacity="0.6">z</text>
  </g>
</svg>
