<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="qGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#ff9a9e" />
      <stop offset="100%" stop-color="#fecfef" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ff758c" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background circle with soft gradient -->
  <circle cx="50" cy="50" r="42" fill="url(#qGrad)" stroke="#ff758c" stroke-width="2" filter="url(#dropShadow)"/>

  <!-- Question Mark -->
  <path d="M 36 38 C 36 26, 64 26, 64 38 C 64 48, 50 52, 50 60" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
  
  <!-- Question Mark Dot -->
  <circle cx="50" cy="74" r="5" fill="#ffffff"/>
</svg>
